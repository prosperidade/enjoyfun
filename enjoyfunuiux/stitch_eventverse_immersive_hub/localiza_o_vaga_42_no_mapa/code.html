<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#4a00a4",
                    "error-container": "#a70138",
                    "secondary-dim": "#57edb1",
                    "error-dim": "#d73357",
                    "surface-container-low": "#1b0a31",
                    "surface-dim": "#150629",
                    "on-secondary": "#005e40",
                    "tertiary-container": "#8342f4",
                    "primary-fixed": "#ab8ffe",
                    "error": "#ff6e84",
                    "on-primary-fixed-variant": "#330b80",
                    "surface-tint": "#b79fff",
                    "inverse-on-surface": "#5e4e74",
                    "background": "#150629",
                    "on-error": "#490013",
                    "on-surface-variant": "#b7a3cf",
                    "tertiary-fixed-dim": "#b48fff",
                    "secondary-fixed": "#68fcbf",
                    "on-secondary-fixed-variant": "#006948",
                    "on-secondary-fixed": "#004931",
                    "tertiary-fixed": "#c0a0ff",
                    "on-tertiary-fixed": "#200051",
                    "surface-container": "#22103a",
                    "surface-container-high": "#291543",
                    "primary": "#b79fff",
                    "on-primary-fixed": "#000000",
                    "secondary-container": "#006c4b",
                    "outline": "#806e96",
                    "surface-container-highest": "#301a4d",
                    "tertiary": "#af88ff",
                    "surface-bright": "#372056",
                    "primary-fixed-dim": "#9d81f0",
                    "on-error-container": "#ffb2b9",
                    "on-tertiary": "#2b0065",
                    "primary-dim": "#a88cfb",
                    "secondary": "#68fcbf",
                    "primary-container": "#ab8ffe",
                    "on-secondary-container": "#e0ffec",
                    "on-primary": "#361083",
                    "secondary-fixed-dim": "#57edb1",
                    "on-surface": "#efdfff",
                    "on-background": "#efdfff",
                    "outline-variant": "#514166",
                    "on-primary-container": "#290070",
                    "inverse-primary": "#684cb6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Space Grotesk"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .isometric-view {
            transform: rotateX(45deg) rotateZ(-45deg);
        }
        .grid-bg {
            background-image: 
                linear-gradient(to right, rgba(131, 66, 244, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(131, 66, 244, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 selection:text-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-violet-950/40 backdrop-blur-xl flex items-center justify-between px-6 h-16 z-50 shadow-[0_0_40px_rgba(167,139,250,0.12)] bg-gradient-to-b from-violet-500/10 to-transparent">
<div class="flex items-center gap-4">
<button class="text-violet-400 hover:bg-violet-400/10 transition-colors active:scale-95 duration-200 p-2 rounded-lg">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-['Space_Grotesk'] tracking-tighter uppercase font-bold text-xl font-black text-violet-400 tracking-widest">PARKING SECTOR</h1>
</div>
<button class="text-violet-400 hover:bg-violet-400/10 transition-colors active:scale-95 duration-200 p-2 rounded-lg">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<!-- Main Content: Isometric Parking Map -->
<main class="relative min-h-screen pt-16 pb-20 overflow-hidden flex flex-col items-center justify-center">
<!-- Celestial Background Gradient -->
<div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(48,26,77,0.4),_rgba(21,6,41,1))]"></div>
<div class="absolute inset-0 z-0 grid-bg"></div>
<!-- 3D Sector Display -->
<div class="relative z-10 w-full max-w-4xl p-8 flex flex-col items-center">
<!-- Sector Header -->
<div class="w-full mb-12 flex justify-between items-end border-l-4 border-primary pl-6">
<div>
<span class="font-label text-xs tracking-[0.2em] text-primary/60 uppercase">System Designation</span>
<h2 class="font-headline text-5xl font-black tracking-tighter text-on-surface mt-1">SECTOR C</h2>
</div>
<div class="text-right">
<span class="font-label text-xs tracking-[0.2em] text-secondary/60 uppercase">Coordinates</span>
<p class="font-headline text-xl text-secondary font-bold">14.02 // G-3</p>
</div>
</div>
<!-- Isometric Grid -->
<div class="relative isometric-view scale-75 md:scale-100 py-20 translate-y-[-10%]">
<!-- Parking Rows -->
<div class="grid grid-cols-5 gap-8">
<!-- Row of Available Slots -->
<div class="w-32 h-20 bg-surface-container border border-secondary/20 shadow-[0_0_15px_rgba(104,252,191,0.1)] rounded-sm flex items-center justify-center group cursor-pointer transition-all hover:bg-secondary/10">
<span class="font-headline text-secondary/40 font-bold">C 38</span>
</div>
<div class="w-32 h-20 bg-surface-container border border-secondary/20 shadow-[0_0_15px_rgba(104,252,191,0.1)] rounded-sm flex items-center justify-center group cursor-pointer transition-all hover:bg-secondary/10">
<span class="font-headline text-secondary/40 font-bold">C 39</span>
</div>
<!-- Empty/Taken Slot -->
<div class="w-32 h-20 bg-surface-container-low border border-outline-variant/10 opacity-40 rounded-sm flex items-center justify-center"></div>
<div class="w-32 h-20 bg-surface-container border border-secondary/20 shadow-[0_0_15px_rgba(104,252,191,0.1)] rounded-sm flex items-center justify-center group cursor-pointer transition-all hover:bg-secondary/10">
<span class="font-headline text-secondary/40 font-bold">C 41</span>
</div>
<!-- SELECTED SLOT: SLOT 42 -->
<div class="relative w-32 h-20 bg-primary/20 border-2 border-primary shadow-[0_0_30px_rgba(183,159,255,0.6)] rounded-sm flex items-center justify-center z-20 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary/30 to-transparent"></div>
<span class="font-headline text-on-surface font-black text-2xl z-10">42</span>
<!-- Pulsing Glow Effect -->
<div class="absolute inset-0 animate-pulse bg-primary/10"></div>
</div>
<!-- More Rows -->
<div class="w-32 h-20 bg-surface-container border border-secondary/20 rounded-sm flex items-center justify-center opacity-80">
<span class="font-headline text-secondary/40 font-bold">C 43</span>
</div>
<div class="w-32 h-20 bg-surface-container border border-secondary/20 rounded-sm flex items-center justify-center opacity-80">
<span class="font-headline text-secondary/40 font-bold">C 44</span>
</div>
<div class="w-32 h-20 bg-surface-container-low border border-outline-variant/10 opacity-40 rounded-sm flex items-center justify-center"></div>
<div class="w-32 h-20 bg-surface-container-low border border-outline-variant/10 opacity-40 rounded-sm flex items-center justify-center"></div>
<div class="w-32 h-20 bg-surface-container border border-secondary/20 rounded-sm flex items-center justify-center opacity-80">
<span class="font-headline text-secondary/40 font-bold">C 47</span>
</div>
</div>
</div>
</div>
<!-- Floating Glassmorphic Info Card -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-40">
<div class="bg-surface-variant/40 backdrop-blur-2xl p-6 rounded-xl border border-primary/20 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-primary/20 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_parking</span>
</div>
<div>
<h3 class="font-headline text-lg font-bold text-on-surface">Vaga 42 Reservada</h3>
<p class="font-body text-xs text-on-surface-variant uppercase tracking-wider">Sector C • Level 02</p>
</div>
</div>
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-black text-xs px-5 py-3 rounded-md shadow-[0_0_20px_rgba(171,143,254,0.4)] active:scale-95 transition-transform uppercase tracking-widest">
                    GO TO SLOT
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-20 pb-safe bg-violet-950/40 backdrop-blur-xl border-t border-violet-400/15 shadow-[0_-10px_40px_rgba(167,139,250,0.1)] rounded-t-xl">
<!-- Nexus Tab -->
<a class="flex flex-col items-center justify-center text-violet-300/50 hover:text-emerald-300 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">hub</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.1em] font-bold mt-1">Nexus</span>
</a>
<!-- Map Tab -->
<a class="flex flex-col items-center justify-center text-violet-300/50 hover:text-emerald-300 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">map</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.1em] font-bold mt-1">Map</span>
</a>
<!-- Parking Tab (Active) -->
<a class="flex flex-col items-center justify-center text-emerald-400 drop-shadow-[0_0_8px_rgba(104,252,191,0.6)] active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_parking</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.1em] font-bold mt-1">Parking</span>
</a>
<!-- Intel Tab -->
<a class="flex flex-col items-center justify-center text-violet-300/50 hover:text-emerald-300 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.1em] font-bold mt-1">Intel</span>
</a>
</nav>
</body></html>
